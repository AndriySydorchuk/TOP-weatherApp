<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
  </head>
  <body>
    <div class="container">
      <div class="home-view">
        <h1 class="title">Weather App</h1>
        <hr />

        <input
          type="text"
          placeholder="Enter city name"
          class="city-input"
          id="cityInput"
        />
      </div>

      <div class="info-view hidden">
        <button class="goback-btn" id="gobackBtn">➡</button>
        <h1 class="title">Weather App</h1>
        <hr />

        <div class="general-info">
          <!-- weather icon -->
          <p class="general-info-temp">18°C</p>
          <p class="general-info-description">broken clouds</p>
          <p class="general-info-location">Rivne, UA</p>
        </div>
        <hr />

        <div class="add-info">
          <div>
            <p class="add-info-feelslike">17°C</p>
            <p>Feels like</p>
          </div>

          <div>
            <p class="add-info-humidity">43%</p>
            <p>Humidity</p>
          </div>

          <div>
            <p class="add-info-windspeed">4.64 m/s</p>
            <p>Wind Speed</p>
          </div>

          <p class="add-info-day">Saturday, May 30, 2026</p>
        </div>
      </div>
    </div>
  </body>
</html>
